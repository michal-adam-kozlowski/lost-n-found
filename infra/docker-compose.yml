services:

  postgres:
    image: postgis/postgis:17-3.5
    environment:
      POSTGRES_DB: lostnfound
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d lostnfound"]
      interval: 5s
      timeout: 5s
      retries: 10

  api:
    build:
      context: ../apps/api  # matches Railway Root Directory
      dockerfile: Dockerfile
    environment:
      ASPNETCORE_ENVIRONMENT: Development
      PORT: "8080"  # mirrors Railway's injected PORT
      ConnectionStrings__Default: >-
        Host=postgres;Port=5432;Database=lostnfound;
        Username=postgres;Password=postgres
      # fake values so the api can boot
      AWS_ENDPOINT_URL: 'localhost:4572'
      AWS_S3_BUCKET_NAME: 'fake'
      AWS_DEFAULT_REGION: 'us-east-1'
      AWS_ACCESS_KEY_ID: '123'
      AWS_SECRET_ACCESS_KEY: 'xyz'
    ports:
      - "8080:8080"
    depends_on:
      postgres:
        condition: service_healthy

volumes:
  postgres_data:
