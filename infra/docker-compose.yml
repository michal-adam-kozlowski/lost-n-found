version: '3.9'

# Run from the infra/ directory:
#   docker compose up --build
#
# Or from repo root:
#   docker compose -f infra/docker-compose.yml up --build

services:

  # ── PostgreSQL ──────────────────────────────────────────────────────────────
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: lostnfound
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d lostnfound"]
      interval: 5s
      timeout: 5s
      retries: 10

  # ── ASP.NET Core API ────────────────────────────────────────────────────────
  api:
    build:
      context: ../apps/api               # self-contained; matches Railway Root Directory
      dockerfile: Dockerfile
    environment:
      ASPNETCORE_ENVIRONMENT: Development
      PORT: "8080"                       # Program.cs reads this; mirrors Railway behaviour
      ConnectionStrings__Default: >-
        Host=postgres;Port=5432;Database=lostnfound;
        Username=postgres;Password=postgres
    ports:
      - "8080:8080"
    depends_on:
      postgres:
        condition: service_healthy

volumes:
  postgres_data:
