version: '3.9'

services:

  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: lostnfound
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d lostnfound"]
      interval: 5s
      timeout: 5s
      retries: 10

  api:
    build:
      context: ../apps/api  # matches Railway Root Directory
      dockerfile: Dockerfile
    environment:
      ASPNETCORE_ENVIRONMENT: Development
      PORT: "8080"  # mirrors Railway's injected PORT
      ConnectionStrings__Default: >-
        Host=postgres;Port=5432;Database=lostnfound;
        Username=postgres;Password=postgres
    ports:
      - "8080:8080"
    depends_on:
      postgres:
        condition: service_healthy

volumes:
  postgres_data:
