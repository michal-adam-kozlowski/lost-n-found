name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  # ── Frontend ─────────────────────────────────────────────────────────────────
  frontend:
    name: Frontend (Next.js)
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          version: 9

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm

      - name: Install dependencies
        run: pnpm install

      - name: Lint
        run: pnpm --filter web lint

      - name: Build
        run: pnpm --filter web build
        env:
          # Provide a placeholder so Next.js doesn't warn about a missing env var
          NEXT_PUBLIC_API_URL: http://localhost:8080

  # ── Backend ──────────────────────────────────────────────────────────────────
  backend:
    name: Backend (.NET 9)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: apps/api

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-dotnet@v4
        with:
          dotnet-version: 9.x

      - name: Restore
        run: dotnet restore

      - name: Build
        run: dotnet build --no-restore -c Release
