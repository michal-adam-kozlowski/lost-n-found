name: Code Review

on:
  pull_request:
    branches: [master]

permissions:
  contents: read
  pull-requests: write
  id-token: write

jobs:
  review:
    name: Claude Code Review
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: anthropics/claude-code-action@v1
        with:
          anthropic_api_key: ${{ secrets.ANTHROPIC_API_KEY }}
          prompt: |
            Review this PR. Focus on bugs, security issues, and logic errors.
            Read the CLAUDE.md file for project-specific review guidelines.
